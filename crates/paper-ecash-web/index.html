<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1f2937" />
    <meta name="description" content="Generate printable paper ecash notes from fedimint" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
      }
    </script>
    <script>
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    </script>
    <link data-trunk rel="rust" data-bin="paper-ecash-web" data-wasm-opt="0" />
    <link data-trunk rel="css" href="src/styles.css" />
    <link data-trunk rel="copy-file" href="src/wallet-worker.js" />
    <link data-trunk rel="copy-file" href="../../public/CNAME" />
    <title>Paper eCash</title>
  </head>
  <body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors">
    <div id="loading" class="flex flex-col items-center justify-center min-h-screen gap-4">
      <div class="text-xl font-semibold">Loading Paper eCash…</div>
      <div class="w-8 h-8 border-4 border-gray-300 dark:border-gray-600 border-t-blue-500 rounded-full animate-spin"></div>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
      .animate-spin { animation: spin 0.8s linear infinite; }
    </style>
  </body>
</html>
