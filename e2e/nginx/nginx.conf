server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Required for SharedArrayBuffer / OPFS sync access handles.
    # Use credentialless (not require-corp) to allow loading Tailwind from CDN.
    add_header Cross-Origin-Opener-Policy   same-origin    always;
    add_header Cross-Origin-Embedder-Policy credentialless always;

    gzip on;
    gzip_types application/wasm application/javascript text/css text/html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ensure WASM files get the correct MIME type
    location ~* \.wasm$ {
        types { application/wasm wasm; }
    }
}
